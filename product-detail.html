<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Details</title>
    <link rel="stylesheet" href="src/css/product-detail-styles.css" />
    <meta name="description" content="Product Details" />
    <!-- RemixIcons -->
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Navigation -->
    <header class="header">
      <nav>
        <div class="logo">
          <a href="index.html">
            <img src="assets/images/RainyDays_Logo.png" alt="Rainy Days" />
          </a>
        </div>

        <div class="flex">
          <input type="checkbox" id="menu-toggle" />
          <label for="menu-toggle" class="menu-icon">&#9776;</label>
          <ul class="menu">
            <ul class="sub-menu">
              <li><a href="product.html">Shop</a></li>
              <li><a href="comingsoon.html">About Us</a></li>
              <li><a href="comingsoon.html">Support</a></li>
            </ul>
          </ul>

          <ul class="sub-menu-2">
            <li><i class="ri-search-line"></i></li>
            <li><a href="signup.html">Sign Up</a></li>
            <li><a href="cart.html">Cart</a></li>
          </ul>
        </div>
      </nav>
    </header>

    <!-- Breadcrumb -->
    <section class="breadcrumb container">
      <h3><a href="index.html">Homepage</a></h3>
      <p>&gt;&gt;</p>
      <p><a href="product.html">Products</a></p>
      <p>&gt;&gt;</p>
      <p id="breadcrumb-title">Product</p>
    </section>

    <noscript>
      <div style="background-color: #fff3cd; border: 1px solid #ffc107; border-radius: 4px; padding: 15px; margin: 20px 0; color: #856404;">
        <strong>⚠️ JavaScript Disabled:</strong> Product details require JavaScript to load. Please <a href="product.html" style="color: #856404; text-decoration: underline;">return to our products page</a> or enable JavaScript.
      </div>
    </noscript>

    <!-- Product Details Section -->
    <section class="product container" id="product-container">
      <!-- Loading message will be replaced by product details -->
      <div style="text-align: center; padding: 60px">
        <p>Loading product...</p>
      </div>
    </section>

    <!-- Footer Section -->
    <footer class="footer">
      <div class="footer__container grid">
        <div class="footer__content grid">
          <div class="footer__data grid">
            <div class="footer__rainy">
              <div class="footer__logo">
                <a href="index.html"
                  ><img
                    src="assets/images/RainyDays_Logo.png"
                    alt="rainydays logo"
                /></a>
              </div>
              <ul class="footer__social">
                <li>
                  <a href="#"
                    ><img
                      src="assets/images/instagram-logo.png"
                      alt="instagram link"
                  /></a>
                </li>
                <li>
                  <a href="#"
                    ><img
                      src="assets/images/facebook-logo.png"
                      alt="facebook link"
                  /></a>
                </li>
                <li>
                  <a href="#"
                    ><img
                      src="assets/images/youtube-logo.png"
                      alt="youtube link"
                  /></a>
                </li>
                <li>
                  <a href="#"
                    ><img
                      src="assets/images/twitter-logo.png"
                      alt="twitter link"
                  /></a>
                </li>
              </ul>
            </div>
            <div>
              <h3 class="footer__title">Shop</h3>
              <ul class="footer__links">
                <li>
                  <a href="product.html" class="footer__link">All Products</a>
                </li>
              </ul>
            </div>
            <div>
              <h3 class="footer__title">Support</h3>
              <ul class="footer__links">
                <li>
                  <a href="comingsoon.html" class="footer__link">Contact Us</a>
                </li>
              </ul>
            </div>
            <div class="footer__payment">
              <h3 class="footer__title">We accept all major payment methods</h3>
              <div class="footer__pay-item">
                <div class="footer__icon-pay">
                  <img src="assets/images/visa-logo.png" alt="visa logo" />
                  <img
                    src="assets/images/mastercard-logo.png"
                    alt="mastercard logo"
                  />
                  <img src="assets/images/amex-logo.png" alt="amex logo" />
                  <img
                    src="assets/images/unionpay- logo.png"
                    alt="union pay logo"
                  />
                </div>
                <div class="footer__icon-pay">
                  <img src="assets/images/paypal-logo.png" alt="paypal logo" />
                  <img
                    src="assets/images/applepay-logo.png"
                    alt="apple pay logo"
                  />
                  <img
                    src="assets/images/googlepay-logo.png"
                    alt="google pay logo"
                  />
                </div>
              </div>
            </div>
          </div>
          <div class="footer__copy">
            <span
              >&#169; Rainydays (2025) Privacy Policy Terms & Conditions Cookies
              Policy</span
            >
          </div>
        </div>
      </div>
    </footer>

    <script src="https://code.jquery.com/jquery-2.2.4.min.js"></script>
    <script src="src/js/api-config.js"></script>
    <script src="src/js/script.js"></script>
    <script src="src/js/product-detail.js"></script>
  </body>
</html>
